<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>我的个人博客</title>  
    <style>  
        body {  
            font-family: Arial, sans-serif;  
        }  
        header, footer {  
            background-color: #f1f1f1;  
            padding: 20px;  
            text-align: center;  
        }  
        nav {  
            float: left;  
            width: 20%;  
            height: 300px; /* 只为了演示 */  
            background: #ccc;  
            padding: 20px;  
        }  
        nav ul {  
            list-style-type: none;  
            padding: 0;  
        }  
        article {  
            float: left;  
            padding: 20px;  
            width: 80%;  
            background-color: #f2f2f2;  
        }  
        section:after {  
            content: "";  
            display: table;  
            clear: both;  
        }  
    </style>  
</head>  
<body>  
  
<header>  
    <h1>我的个人博客</h1>  
    <p>欢迎来到我的个人博客。</p>  
</header>  
  
<section>  
    <nav>  
        <ul>  
            <li><a href="#">首页</a></li>  
            <li><a href="#">文章</a></li>  
            <li><a href="#">关于我</a></li>  
            <li><a href="#">联系方式</a></li>  
        </ul>  
    </nav>  
  
    <article>  
        <h2>文章标题</h2>  
        <h5>发布日期，作者</h5>  
        <p>这是一篇博客文章的内容。这里可以写很多有趣的东西，比如技术分享、生活感悟等。</p>  
        <p>继续写作，分享你的思考和知识。</p>  
    </article>  
</section>  
  
<footer>  
    <p>版权所有 &copy; 2023</p>  
</footer>  
  
</body>  
</html>
